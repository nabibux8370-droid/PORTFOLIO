<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get in Touch Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
 <a href="file:///C:/Users/N%20TECH/Desktop/prectice%20html/portfodio.html" target="_blank" class="inline-block bg-blue-600 hover:bg-orange-700 text-white font-medium py-2 px-4 rounded transition duration-200">
  Back
</a>
    <div class="bg-white p-8 rounded-lg max-w-md w-full">
        
        <h2 class="text-3xl font-semibold text-center text-green-500 mb-6">
            Get in Touch
        </h2>

        <form class="space-y-4">

            <div>
                <input type="text" placeholder="Your Name" 
                    class="w-full px-4 py-3 border border-sky-200 rounded-md focus:outline-none focus:ring-2 focus:ring-2 placeholder-gray-400 text-gray-700">
            </div>

            <div>
                <input type="text" placeholder="Your Surname" 
                    class="w-full px-4 py-3 border border-sky-200 rounded-md focus:outline-none focus:ring-2 focus:ring-2 placeholder-gray-400 text-gray-700">
            </div>

            <div>
                <input type="email" placeholder="Your Email" class="w-full px-4 py-3 border border-sky-200 rounded-md focus:outline-none focus:ring-2 focus:ring-2 placeholder-gray-400 text-gray-700">
            </div>

            <div>
                <textarea placeholder="Your Message" rows="4" class="w-full px-4 py-3 border border-sky-200 rounded-md focus:outline-none focus:ring-2 focus:ring-2 placeholder-gray-400 text-gray-700 resize-none"></textarea>
            </div>

            <button type="submit" class="w-full bg-yellow-300    hover:bg-indigo-200 text-white font-medium py-3 px-4 rounded-md transition duration-200 tracking-wide text-sm">
                Send Message
            </button>

        </form>
    </div>

</body>
</html>
